name: Markdown Lint

on:
  pull_request:
    paths:
      - "**/*.md"
  push:
    branches:
      - main
    paths:
      - "**/*.md"

jobs:
  markdownlint:
    name: Lint Markdown files
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check strict workflow governance contract
        run: sh .github/scripts/check_strict_governance.sh

      - name: Check workflow note contract (full scan)
        run: sh .github/scripts/check_workflow_contract.sh

      - name: Check skill-gate coverage
        run: sh .github/scripts/check_skill_gate_coverage.sh

      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: |
            **/*.md
            !.github/**
            !agent-output/**
            !Analysis-and-design-of-a-platform-for-real-time-speech-translation-/**
            !docs/Analysis-and-design-of-a-platform-for-real-time-speech-translation-/**
            !docs/books/**
            !docs/AsyncAPI/**
            !docs/Mermaid-diagrams/**
            !docs/OpenAPI/docs/**
            !docs/code-guidelines/**
            !docs/pandoc-manual.md
            !model_cache/**
            !**/.venv/**
            !services/**/generated/**
            !services/**/models/**
          config: .markdownlint.json
