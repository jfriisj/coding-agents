asyncapi: 2.6.0
info:
  title: Real-Time Speech Translation WebSocket API
  version: 0.2.0
  description: >
    Event-driven API for real-time two-way speech translation and conference mode.
    This API handles streaming of binary audio and JSON control messages and transcripts.
  contact:
    name: Jon Friis Jakobsen

servers:
  production:
    url: wss://api.taleoversaet.dk/ws
    protocol: wss
    description: Production server for active translation sessions.
    security:
      - bearerAuth: []
  development:
    url: ws://localhost:8080/ws
    protocol: ws
    description: Local development server.
    security:
      - bearerAuth: []

channels:
  /sessions/{sessionId}:
    description: Channel for a specific translation session.
    parameters:
      sessionId:
        description: Unique session ID created through the REST API.
        schema:
          type: string

    # PUBLISH: messages sent by the client to the server
    publish:
      description: Messages sent by the client (frontend) to the server. The first control message after connect must be AUTH; binary audio chunks before AUTHORIZED status are rejected.
      message:
        oneOf:
          - $ref: '#/components/messages/ClientAudioStream'
          - $ref: '#/components/messages/ClientControlMessage'

    # SUBSCRIBE: messages received by the client from the server
    subscribe:
      description: Messages and events that the client (frontend) listens for from the server.
      message:
        oneOf:
          - $ref: '#/components/messages/ServerAudioStream'
          - $ref: '#/components/messages/ServerAuthStatus'
          - $ref: '#/components/messages/ServerTranscriptEvent'
          - $ref: '#/components/messages/ServerConferenceStats'
          - $ref: '#/components/messages/ServerError'

components:
  messages:
    # ---------------------------------------------------------
    # FROM CLIENT (FRONTEND) -> TO SERVER
    # ---------------------------------------------------------
    ClientAudioStream:
      name: ClientAudioStream
      title: Microphone audio stream
      summary: Raw binary audio data (for example PCM or Opus chunks) from the user's microphone. Accepted only after AUTH_STATUS=AUTHORIZED.
      contentType: application/octet-stream
      payload:
        type: string
        format: binary

    ClientControlMessage:
      name: ClientControlMessage
      title: Client control message
      summary: JSON message used to control the session (for example pause or change voice).
      description: |
        `CHANGE_LANGUAGE` and `CHANGE_VOICE` must use values from the REST capability source `/demo/capabilities`; query-string token transport is forbidden; WebSocket authentication is established through an `AUTH` control message after connect; `sessionId` is not an authorization credential; token-session claim binding is mandatory; a strict origin allowlist is required; and runtime tokens MUST be short-lived (<= 300s).
      contentType: application/json
      payload:
        $ref: '#/components/schemas/ClientControlPayload'

    # ---------------------------------------------------------
    # FROM SERVER -> TO CLIENT (FRONTEND)
    # ---------------------------------------------------------
    ServerAudioStream:
      name: ServerAudioStream
      title: Synthesized audio stream (TTS)
      summary: Binary audio (text-to-speech) of the translated speech that the frontend should play back.
      contentType: application/octet-stream
      payload:
        type: string
        format: binary

    ServerAuthStatus:
      name: ServerAuthStatus
      title: WebSocket AUTH status
      summary: Explicit authentication acknowledgement and error classification from the server for the client's recovery flow.
      contentType: application/json
      payload:
        $ref: '#/components/schemas/AuthStatusPayload'

    ServerTranscriptEvent:
      name: ServerTranscriptEvent
      title: Live transcription update
      summary: JSON message containing the ongoing transcription and translation.
      contentType: application/json
      payload:
        $ref: '#/components/schemas/TranscriptEventPayload'

    ServerConferenceStats:
      name: ServerConferenceStats
      title: Conference statistics
      summary: Update containing the number of listeners per language (relevant only for Conference Mode).
      contentType: application/json
      payload:
        $ref: '#/components/schemas/ConferenceStatsPayload'

    ServerError:
      name: ServerError
      title: WebSocket error
      summary: Error message from the server (for example when the audio stream is interrupted).
      contentType: application/json
      payload:
        $ref: '#/components/schemas/ErrorPayload'

  schemas:
    # --- DTOs for JSON payloads ---
    ClientControlPayload:
      type: object
      required:
        - action
      properties:
        action:
          type: string
          enum: [AUTH, PAUSE_RECOGNITION, RESUME_RECOGNITION, STOP_SESSION, CHANGE_VOICE, CHANGE_LANGUAGE]
        data:
          type: object
          properties:
            token:
              type: string
              description: Short-lived, session-bound JWT. It must never be sent in the URL or logged in telemetry.
            voiceId:
              type: string
            targetLanguage:
              type: string
              example: "de-DE"

    AuthStatusPayload:
      type: object
      required:
        - event
        - data
      properties:
        event:
          type: string
          enum: [AUTH_STATUS]
        data:
          type: object
          required:
            - status
          properties:
            status:
              type: string
              enum:
                [AUTHORIZED, AUTH_REQUIRED, INVALID_TOKEN, EXPIRED_TOKEN, REVOKED_TOKEN, SESSION_BINDING_MISMATCH, ORIGIN_NOT_ALLOWED, RATE_LIMITED, SERVICE_UNAVAILABLE, NETWORK_UNAVAILABLE, TIMEOUT]
            message:
              type: string
              example: "Token validation failed"

    TranscriptEventPayload:
      type: object
      required:
        - event
        - data
      properties:
        event:
          type: string
          enum: [TRANSCRIPT_UPDATE]
        data:
          type: object
          required:
            - speakerId
            - timestamp
            - isFinal
          properties:
            speakerId:
              type: string
            timestamp:
              type: string
              example: "00:01:23"
            originalText:
              type: string
              example: "Let us start with"
            translatedText:
              type: string
              example: "So let's start with"
            isFinal:
              type: boolean
              description: true when the sentence is complete, false when it is still a live hypothesis.

    ConferenceStatsPayload:
      type: object
      required:
        - event
        - data
      properties:
        event:
          type: string
          enum: [CONFERENCE_STATS]
        data:
          type: object
          required:
            - totalListeners
            - channels
          properties:
            totalListeners:
              type: integer
              example: 65
            channels:
              type: array
              items:
                type: object
                properties:
                  language:
                    type: string
                    example: "en-US"
                  listeners:
                    type: integer
                    example: 42

    ErrorPayload:
      type: object
      required:
        - event
        - data
      properties:
        event:
          type: string
          enum: [ERROR]
        data:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              enum: [AUDIO_STREAM_INTERRUPTED, GUARDRAIL_INTERVENTION, VAD_REJECTED]
            message:
              type: string
              example: "The microphone connection was interrupted."
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT